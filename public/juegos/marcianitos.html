<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders - Marcianitos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            color: #00ff00;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            padding: 15px 20px;
            background: #1a1a1a;
            border: 2px solid #00ff00;
            border-radius: 8px;
        }

        .game-header div {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .game-header span {
            color: #ffff00;
        }

        canvas {
            border: 3px solid #00ff00;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .controls {
            display: flex;
            gap: 30px;
            font-size: 14px;
            color: #00cc00;
            text-align: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls div {
            padding: 8px 15px;
            background: #1a1a1a;
            border: 1px solid #00ff00;
            border-radius: 4px;
        }

        .controls kbd {
            background: #00ff00;
            color: #0a0a0a;
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: bold;
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #00ff00;
            padding: 40px 60px;
            text-align: center;
            display: none;
            border-radius: 8px;
            z-index: 100;
        }

        .overlay.active {
            display: block;
        }

        .overlay h2 {
            font-size: 48px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .overlay p {
            font-size: 20px;
            margin: 10px 0;
        }

        .overlay .final-score {
            font-size: 32px;
            color: #ffff00;
            margin: 20px 0;
        }

        @media (max-width: 900px) {
            canvas {
                max-width: 100%;
                height: auto;
            }

            .game-header {
                font-size: 14px;
                padding: 10px 15px;
            }

            .controls {
                font-size: 12px;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div>PUNTOS: <span id="score">0</span></div>
            <div>NIVEL: <span id="level">1</span></div>
            <div>VIDAS: <span id="lives">3</span></div>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div class="controls">
            <div><kbd>←</kbd> <kbd>→</kbd> Mover</div>
            <div><kbd>Espacio</kbd> Disparar</div>
            <div><kbd>P</kbd> Pausa</div>
            <div><kbd>R</kbd> Reiniciar</div>
        </div>

        <div class="overlay" id="overlay">
            <h2 id="overlayTitle">GAME OVER</h2>
            <p class="final-score">PUNTUACIÓN FINAL: <span id="finalScore">0</span></p>
            <p>Pulsa <kbd>R</kbd> para reiniciar</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let gameState = {
            score: 0,
            level: 1,
            lives: 3,
            paused: false,
            gameOver: false,
            running: true
        };

        // Player
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 60,
            width: 50,
            height: 30,
            speed: 7,
            dx: 0,
            color: '#00ff00'
        };

        // Bullets
        let playerBullets = [];
        let alienBullets = [];
        const bulletSpeed = 8;
        const alienBulletSpeed = 4;
        let canShoot = true;
        let shootCooldown = 250;

        // Aliens
        let aliens = [];
        const alienRows = 5;
        const alienCols = 11;
        let alienDirection = 1;
        let alienSpeed = 1;
        let alienDropAmount = 30;
        let lastAlienShot = 0;
        let alienShootInterval = 1500;

        // Bunkers
        let bunkers = [];
        const bunkerWidth = 80;
        const bunkerHeight = 60;
        const bunkerPixelSize = 4;

        // Alien types with different colors and points
        const alienTypes = [
            { color: '#ff6b6b', points: 30 },  // Top row - red
            { color: '#ffd93d', points: 20 },  // Second row - yellow
            { color: '#6bcb77', points: 20 },  // Third row - green
            { color: '#4d96ff', points: 10 },  // Fourth row - blue
            { color: '#ff6b9d', points: 10 }   // Bottom row - pink
        ];

        // Initialize game
        function init() {
            createAliens();
            createBunkers();
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        // Create aliens grid
        function createAliens() {
            aliens = [];
            const alienWidth = 40;
            const alienHeight = 30;
            const padding = 15;
            const startX = (canvas.width - (alienCols * (alienWidth + padding))) / 2;
            const startY = 80;

            for (let row = 0; row < alienRows; row++) {
                for (let col = 0; col < alienCols; col++) {
                    aliens.push({
                        x: startX + col * (alienWidth + padding),
                        y: startY + row * (alienHeight + padding),
                        width: alienWidth,
                        height: alienHeight,
                        type: row,
                        alive: true
                    });
                }
            }

            // Adjust difficulty based on level
            alienSpeed = 1 + (gameState.level - 1) * 0.5;
            alienShootInterval = Math.max(500, 1500 - (gameState.level - 1) * 150);
        }

        // Create bunkers
        function createBunkers() {
            bunkers = [];
            const bunkerCount = 4;
            const spacing = (canvas.width - bunkerCount * bunkerWidth) / (bunkerCount + 1);

            for (let i = 0; i < bunkerCount; i++) {
                const bunker = {
                    x: spacing + i * (bunkerWidth + spacing),
                    y: canvas.height - 150,
                    width: bunkerWidth,
                    height: bunkerHeight,
                    pixels: []
                };

                // Create bunker pixels (destructible)
                for (let py = 0; py < bunker.height / bunkerPixelSize; py++) {
                    for (let px = 0; px < bunker.width / bunkerPixelSize; px++) {
                        // Create arch shape
                        const centerX = bunker.width / 2 / bunkerPixelSize;
                        const isArch = py > bunker.height / bunkerPixelSize * 0.6 &&
                                       Math.abs(px - centerX) < 3;

                        if (!isArch) {
                            // Round the top corners
                            const distFromCenter = Math.abs(px - centerX);
                            const topCurve = py < 3 && distFromCenter > 8 - py;
                            if (!topCurve) {
                                bunker.pixels.push({
                                    x: px * bunkerPixelSize,
                                    y: py * bunkerPixelSize,
                                    alive: true
                                });
                            }
                        }
                    }
                }

                bunkers.push(bunker);
            }
        }

        // Draw player ship
        function drawPlayer() {
            ctx.fillStyle = player.color;

            // Ship body
            ctx.fillRect(player.x, player.y + 10, player.width, player.height - 10);

            // Ship cannon
            ctx.fillRect(player.x + player.width / 2 - 3, player.y, 6, 15);

            // Ship wings
            ctx.fillRect(player.x - 5, player.y + 15, 10, 15);
            ctx.fillRect(player.x + player.width - 5, player.y + 15, 10, 15);
        }

        // Draw alien
        function drawAlien(alien) {
            if (!alien.alive) return;

            const type = alienTypes[alien.type];
            ctx.fillStyle = type.color;

            const x = alien.x;
            const y = alien.y;
            const w = alien.width;
            const h = alien.height;

            // Different shapes for different alien types
            if (alien.type === 0) {
                // Squid type
                ctx.fillRect(x + w * 0.3, y, w * 0.4, h * 0.3);
                ctx.fillRect(x + w * 0.2, y + h * 0.2, w * 0.6, h * 0.4);
                ctx.fillRect(x + w * 0.1, y + h * 0.4, w * 0.8, h * 0.3);
                ctx.fillRect(x, y + h * 0.6, w * 0.2, h * 0.3);
                ctx.fillRect(x + w * 0.8, y + h * 0.6, w * 0.2, h * 0.3);
            } else if (alien.type === 1) {
                // Crab type
                ctx.fillRect(x + w * 0.2, y, w * 0.6, h * 0.5);
                ctx.fillRect(x + w * 0.1, y + h * 0.3, w * 0.8, h * 0.4);
                ctx.fillRect(x, y + h * 0.5, w, h * 0.3);
                ctx.fillRect(x - w * 0.1, y + h * 0.2, w * 0.2, h * 0.3);
                ctx.fillRect(x + w * 0.9, y + h * 0.2, w * 0.2, h * 0.3);
            } else {
                // Octopus type
                ctx.fillRect(x + w * 0.3, y, w * 0.4, h * 0.4);
                ctx.fillRect(x + w * 0.1, y + h * 0.2, w * 0.8, h * 0.5);
                ctx.fillRect(x, y + h * 0.5, w, h * 0.3);
                ctx.fillRect(x + w * 0.1, y + h * 0.8, w * 0.2, h * 0.2);
                ctx.fillRect(x + w * 0.4, y + h * 0.8, w * 0.2, h * 0.2);
                ctx.fillRect(x + w * 0.7, y + h * 0.8, w * 0.2, h * 0.2);
            }

            // Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(x + w * 0.25, y + h * 0.35, w * 0.15, h * 0.15);
            ctx.fillRect(x + w * 0.6, y + h * 0.35, w * 0.15, h * 0.15);
        }

        // Draw bunkers
        function drawBunkers() {
            ctx.fillStyle = '#00ff00';
            bunkers.forEach(bunker => {
                bunker.pixels.forEach(pixel => {
                    if (pixel.alive) {
                        ctx.fillRect(
                            bunker.x + pixel.x,
                            bunker.y + pixel.y,
                            bunkerPixelSize,
                            bunkerPixelSize
                        );
                    }
                });
            });
        }

        // Draw bullets
        function drawBullets() {
            // Player bullets
            ctx.fillStyle = '#ffffff';
            playerBullets.forEach(bullet => {
                ctx.fillRect(bullet.x - 2, bullet.y, 4, 15);
            });

            // Alien bullets
            ctx.fillStyle = '#ff6b6b';
            alienBullets.forEach(bullet => {
                ctx.fillRect(bullet.x - 2, bullet.y, 4, 15);
            });
        }

        // Update player position
        function updatePlayer() {
            player.x += player.dx;

            // Boundaries
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) {
                player.x = canvas.width - player.width;
            }
        }

        // Update bullets
        function updateBullets() {
            // Player bullets
            playerBullets = playerBullets.filter(bullet => {
                bullet.y -= bulletSpeed;
                return bullet.y > -20;
            });

            // Alien bullets
            alienBullets = alienBullets.filter(bullet => {
                bullet.y += alienBulletSpeed;
                return bullet.y < canvas.height + 20;
            });
        }

        // Update aliens
        function updateAliens() {
            let hitEdge = false;
            let lowestY = 0;

            // Check if any alien hit the edge
            aliens.forEach(alien => {
                if (!alien.alive) return;

                if (alien.x + alien.width >= canvas.width - 10 && alienDirection === 1) {
                    hitEdge = true;
                }
                if (alien.x <= 10 && alienDirection === -1) {
                    hitEdge = true;
                }

                if (alien.y > lowestY) {
                    lowestY = alien.y;
                }
            });

            // Move aliens
            if (hitEdge) {
                alienDirection *= -1;
                aliens.forEach(alien => {
                    alien.y += alienDropAmount;
                });
            } else {
                aliens.forEach(alien => {
                    alien.x += alienSpeed * alienDirection;
                });
            }

            // Check if aliens reached the bottom
            if (lowestY + 30 >= player.y) {
                endGame();
            }

            // Alien shooting
            const now = Date.now();
            if (now - lastAlienShot > alienShootInterval) {
                alienShoot();
                lastAlienShot = now;
            }

            // Check if all aliens are destroyed
            if (aliens.every(a => !a.alive)) {
                nextLevel();
            }
        }

        // Alien shoots
        function alienShoot() {
            const aliveAliens = aliens.filter(a => a.alive);
            if (aliveAliens.length === 0) return;

            // Get bottom-most aliens in each column
            const columns = {};
            aliveAliens.forEach(alien => {
                const col = Math.round(alien.x / 55);
                if (!columns[col] || alien.y > columns[col].y) {
                    columns[col] = alien;
                }
            });

            // Random alien from bottom row shoots
            const bottomAliens = Object.values(columns);
            const shooter = bottomAliens[Math.floor(Math.random() * bottomAliens.length)];

            alienBullets.push({
                x: shooter.x + shooter.width / 2,
                y: shooter.y + shooter.height
            });
        }

        // Check collisions
        function checkCollisions() {
            // Player bullets vs aliens
            playerBullets.forEach((bullet, bulletIndex) => {
                aliens.forEach(alien => {
                    if (!alien.alive) return;

                    if (bullet.x >= alien.x &&
                        bullet.x <= alien.x + alien.width &&
                        bullet.y >= alien.y &&
                        bullet.y <= alien.y + alien.height) {

                        alien.alive = false;
                        playerBullets.splice(bulletIndex, 1);
                        gameState.score += alienTypes[alien.type].points;
                        updateUI();
                    }
                });
            });

            // Bullets vs bunkers
            bunkers.forEach(bunker => {
                // Player bullets
                playerBullets.forEach((bullet, bulletIndex) => {
                    bunker.pixels.forEach(pixel => {
                        if (!pixel.alive) return;

                        const pixelX = bunker.x + pixel.x;
                        const pixelY = bunker.y + pixel.y;

                        if (bullet.x >= pixelX &&
                            bullet.x <= pixelX + bunkerPixelSize &&
                            bullet.y >= pixelY &&
                            bullet.y <= pixelY + bunkerPixelSize) {

                            pixel.alive = false;
                            playerBullets.splice(bulletIndex, 1);
                        }
                    });
                });

                // Alien bullets
                alienBullets.forEach((bullet, bulletIndex) => {
                    bunker.pixels.forEach(pixel => {
                        if (!pixel.alive) return;

                        const pixelX = bunker.x + pixel.x;
                        const pixelY = bunker.y + pixel.y;

                        if (bullet.x >= pixelX &&
                            bullet.x <= pixelX + bunkerPixelSize &&
                            bullet.y >= pixelY &&
                            bullet.y <= pixelY + bunkerPixelSize) {

                            pixel.alive = false;
                            alienBullets.splice(bulletIndex, 1);
                        }
                    });
                });
            });

            // Alien bullets vs player
            alienBullets.forEach((bullet, bulletIndex) => {
                if (bullet.x >= player.x &&
                    bullet.x <= player.x + player.width &&
                    bullet.y >= player.y &&
                    bullet.y <= player.y + player.height) {

                    alienBullets.splice(bulletIndex, 1);
                    playerHit();
                }
            });

            // Aliens vs player
            aliens.forEach(alien => {
                if (!alien.alive) return;

                if (alien.x < player.x + player.width &&
                    alien.x + alien.width > player.x &&
                    alien.y < player.y + player.height &&
                    alien.y + alien.height > player.y) {
                    endGame();
                }
            });
        }

        // Player hit
        function playerHit() {
            gameState.lives--;
            updateUI();

            if (gameState.lives <= 0) {
                endGame();
            } else {
                // Clear bullets
                playerBullets = [];
                alienBullets = [];
            }
        }

        // Next level
        function nextLevel() {
            gameState.level++;
            playerBullets = [];
            alienBullets = [];
            createAliens();
            updateUI();
        }

        // End game
        function endGame() {
            gameState.gameOver = true;
            gameState.running = false;

            document.getElementById('overlayTitle').textContent = 'GAME OVER';
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('overlay').classList.add('active');
        }

        // Update UI
        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('lives').textContent = gameState.lives;
        }

        // Restart game
        function restartGame() {
            gameState = {
                score: 0,
                level: 1,
                lives: 3,
                paused: false,
                gameOver: false,
                running: true
            };

            player.x = canvas.width / 2 - 25;
            playerBullets = [];
            alienBullets = [];

            createAliens();
            createBunkers();
            updateUI();

            document.getElementById('overlay').classList.remove('active');
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw game elements
            drawBunkers();
            drawPlayer();
            aliens.forEach(drawAlien);
            drawBullets();

            // Draw pause overlay
            if (gameState.paused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#00ff00';
                ctx.font = 'bold 48px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSA', canvas.width / 2, canvas.height / 2);

                ctx.font = '24px Courier New';
                ctx.fillText('Pulsa P para continuar', canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        // Game loop
        function gameLoop() {
            if (!gameState.paused && gameState.running) {
                updatePlayer();
                updateBullets();
                updateAliens();
                checkCollisions();
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') {
                player.dx = -player.speed;
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                player.dx = player.speed;
            } else if (e.key === ' ' && canShoot && !gameState.paused && gameState.running) {
                playerBullets.push({
                    x: player.x + player.width / 2,
                    y: player.y
                });
                canShoot = false;
                setTimeout(() => canShoot = true, shootCooldown);
            } else if (e.key === 'p' || e.key === 'P') {
                if (!gameState.gameOver) {
                    gameState.paused = !gameState.paused;
                }
            } else if (e.key === 'r' || e.key === 'R') {
                restartGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            if ((e.key === 'ArrowLeft' || e.key === 'a') && player.dx < 0) {
                player.dx = 0;
            } else if ((e.key === 'ArrowRight' || e.key === 'd') && player.dx > 0) {
                player.dx = 0;
            }
        });

        // Prevent spacebar from scrolling
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
            }
        });

        // Start game
        init();
    </script>
</body>
</html>
